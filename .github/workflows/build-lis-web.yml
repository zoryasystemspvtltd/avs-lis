name: Build LIS.Web (Angular 10)

on:
  push:
    paths:
      - 'web/Lis.Web/**'
  pull_request:
    paths:
      - 'web/Lis.Web/**'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '14'
          cache: 'npm'

      - name: Cache node modules (optional)
        uses: actions/cache@v4
        with:
          path: |
            C:\\Users\\runner\\AppData\\Roaming\\npm-cache
            web/Lis.Web\node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('web/Lis.Web/**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: web/Lis.Web
        shell: pwsh
        run: |
          npm ci --no-audit --prefer-offline

      - name: Build (production)
        working-directory: web/Lis.Web
        shell: pwsh
        run: |
          if (Test-Path package.json -PathType Leaf -and (Get-Content package.json | Select-String '"build"')) {
            npm run build -- --prod
          } else {
            npx -p @angular/cli@10 ng build --configuration production
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lis-web-dist
          path: web/Lis.Web/dist
