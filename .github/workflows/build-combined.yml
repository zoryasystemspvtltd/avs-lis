name: Deploy LIS (API + Web)

on:
  workflow_dispatch: # 

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Visual Studio (MSBuild)
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1

      - name: Restore NuGet packages (Solution)
        run: nuget restore -NonInteractive -Verbosity quiet -PackagesDirectory packages

      - name: Ensure client libs for API (jquery)
        shell: powershell
        run: |
          $dest = 'web\Lis.Api\Scripts\jquery-3.7.1.js'
          $dir = Split-Path $dest
          if (-not (Test-Path $dir)) { New-Item -Path $dir -ItemType Directory -Force | Out-Null }
          Write-Host "Downloading jquery to $dest"
          Invoke-WebRequest -Uri 'https://code.jquery.com/jquery-3.7.1.min.js' -OutFile $dest -UseBasicParsing

      - name: Publish API to runner temp directory
        shell: powershell
        run: |
          $outDir = '${{ runner.temp }}\zorya'
          if (-not (Test-Path $outDir)) { New-Item -Path $outDir -ItemType Directory -Force | Out-Null }
          Write-Host "Publishing to: $outDir"

          # Publish the ASP.NET (Framework) web app to a file-system folder so the artifact contains the complete site
          msbuild 'web\Lis.Api\Lis.Api.csproj' /m /p:Configuration=Release /p:Platform="AnyCPU" /tv:Current

          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSBuild failed with exit code $LASTEXITCODE"
            exit 1
          }

          # Copy the compiled output to the publish directory
          Copy-Item -Path 'web\Lis.Api\bin\*' -Destination $outDir -Recurse -Force
          Write-Host "API published successfully to $outDir"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '10'
          cache: 'npm'
          # Ensure setup-node finds the lockfile inside the web/Lis.Web folder
          cache-dependency-path: 'web/Lis.Web/package-lock.json'

      - name: Ensure npm v6 (compat for Angular 10 lockfile)
        shell: powershell
        run: |
          Write-Host "Current npm version:"; npm --version
          Write-Host "Installing npm@6 to avoid lockfile npm v7+ incompatibilities"
          npm install -g npm@6.14.15
          Write-Host "New npm version:"; npm --version

      - name: Cache node modules (optional)
        uses: actions/cache@v4
        with:
          path: |
            C:\\Users\\runner\\AppData\\Roaming\\npm-cache
            web/Lis.Web\node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('web/Lis.Web/**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install web dependencies
        working-directory: web/Lis.Web
        shell: powershell
        run: npm install --no-audit --prefer-offline

      - name: Build Angular web (production)
        working-directory: web/Lis.Web
        shell: powershell
        run: |
          if ((Test-Path package.json -PathType Leaf) -and (Get-Content package.json | Select-String '"build"')) {
            npm run build -- --prod
          } else {
            npx -p @angular/cli@10 ng build --configuration production
          }

      - name: Copy web build to runner temp directory
        shell: powershell
        run: |
          $uiOut = '${{ runner.temp }}\zorya\ui'
          if (-not (Test-Path $uiOut)) { New-Item -Path $uiOut -ItemType Directory -Force | Out-Null }
          # Locate the generated index.html under web/Lis.Web/dist
          $distRoot = Join-Path $PWD 'web\Lis.Web\dist'
          if (-not (Test-Path $distRoot)) { Write-Error "dist folder not found at $distRoot"; exit 1 }
          $distDir = Get-ChildItem -Path $distRoot -Directory | Select-Object -First 1
          if (-not $distDir) { Write-Error "Could not find built angular app folder under $distRoot"; exit 1 }
          Copy-Item -Path (Join-Path $distDir.FullName '*') -Destination $uiOut -Recurse -Force

      - name: Replace Index.cshtml with ui/index.html content
        shell: powershell
        run: |
          $src = '${{ runner.temp }}\zorya\ui\index.html'
          $dest = 'web\Lis.Api\Views\Home\Index.cshtml'
          if (-not (Test-Path $src)) { Write-Error "Source index.html not found at $src"; exit 1 }
          $content = Get-Content -Raw -Path $src
          # Overwrite the cshtml file with the HTML content (no cshtml layout applied)
          Set-Content -Path $dest -Value $content -Encoding UTF8

      - name: Copy client libs (jQuery + SignalR) to API Scripts
        shell: powershell
        run: |
          $dest = 'web\Lis.Api\Scripts'
          if (-not (Test-Path $dest)) { New-Item -Path $dest -ItemType Directory -Force | Out-Null }

          # Prefer copying jQuery from the web project's node_modules (created by npm install)
          $jqSrc = 'web\Lis.Web\node_modules\jquery\dist'
          if (Test-Path $jqSrc) {
            Copy-Item -Path (Join-Path $jqSrc '*') -Destination $dest -Recurse -Force
            Write-Host "Copied jQuery files from $jqSrc to $dest"
          } else {
            Write-Host "jquery not found in node_modules; downloading minified and unminified files"
            Invoke-WebRequest -Uri 'https://code.jquery.com/jquery-3.7.1.min.js' -OutFile (Join-Path $dest 'jquery-3.7.1.min.js') -UseBasicParsing
            Invoke-WebRequest -Uri 'https://code.jquery.com/jquery-3.7.1.js' -OutFile (Join-Path $dest 'jquery-3.7.1.js') -UseBasicParsing
            Invoke-WebRequest -Uri 'https://code.jquery.com/jquery-3.7.1.slim.min.js' -OutFile (Join-Path $dest 'jquery-3.7.1.slim.min.js') -UseBasicParsing
            Invoke-WebRequest -Uri 'https://code.jquery.com/jquery-3.7.1.slim.js' -OutFile (Join-Path $dest 'jquery-3.7.1.slim.js') -UseBasicParsing
          }

          # Try to download SignalR client files (fallback to empty placeholder if not available)
          $sigMin = Join-Path $dest 'jquery.signalR-2.4.2.min.js'
          $sig = Join-Path $dest 'jquery.signalR-2.4.2.js'
          if (-not (Test-Path $sigMin) -or -not (Test-Path $sig)) {
            try {
              Invoke-WebRequest -Uri 'https://cdnjs.cloudflare.com/ajax/libs/jquery-signalR/2.4.2/jquery.signalR.min.js' -OutFile $sigMin -UseBasicParsing -ErrorAction Stop
              Invoke-WebRequest -Uri 'https://cdnjs.cloudflare.com/ajax/libs/jquery-signalR/2.4.2/jquery.signalR.js' -OutFile $sig -UseBasicParsing -ErrorAction Stop
              Write-Host 'Downloaded jquery.signalR from CDNJS'
            } catch {
              Write-Host 'Could not download SignalR client from CDNJS; creating empty placeholder files to satisfy publish'
              New-Item -Path $sig -ItemType File -Force | Out-Null
              New-Item -Path $sigMin -ItemType File -Force | Out-Null
            }
          }

      - name: Publish API to runner temp directory
        shell: powershell
        run: |
          $outDir = '${{ runner.temp }}\zorya'
          if (-not (Test-Path $outDir)) { New-Item -Path $outDir -ItemType Directory -Force | Out-Null }
          Write-Host "Publishing to: $outDir"

          msbuild 'web\Lis.Api\Lis.Api.csproj' /m /p:Configuration=Release /p:Platform="AnyCPU" /p:WebPublishMethod=FileSystem /p:publishUrl=$outDir /p:DeployOnBuild=true /p:DeleteExistingFiles=true /tv:Current

          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSBuild failed with exit code $LASTEXITCODE"
            exit 1
          }

          Write-Host "API published successfully to $outDir"

      - name: Upload combined output artifact
        uses: actions/upload-artifact@v4
        with:
          name: combined-build
          path: |
            ${{ runner.temp }}/zorya
            web/Lis.Api/Views/Home/Index.cshtml
