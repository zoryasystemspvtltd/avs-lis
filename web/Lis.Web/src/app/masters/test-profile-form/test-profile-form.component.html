<br>
<div class="avilis-form-page" *ngIf="form">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <h3>Test Profile {{id ? '(Edit)' : '(Create)'}}</h3>
    <hr />

    <div class="row">
      <div class="col-sm-2 col-md-2 col-lg-2 form-grid-stye"><label>Code<span class="error">*</span></label></div>
      <div class="col-sm-4 col-md-4 col-lg-4 form-grid-stye">
        <div class="input-group">
          <span class="input-group-addon"><i class="glyphicon glyphicon-barcode"></i></span>
          <input type="text" class="form-control" formControlName="code" maxlength="20" [readonly]="!!id" />
        </div>
        <span *ngIf="isInValid('code')" class="error">Code is required.</span>
      </div>
      <div class="col-sm-2 col-md-2 col-lg-2 form-grid-stye"><label>Name<span class="error">*</span></label></div>
      <div class="col-sm-4 col-md-4 col-lg-4 form-grid-stye">
        <div class="input-group">
          <span class="input-group-addon"><i class="glyphicon glyphicon-tag"></i></span>
          <input type="text" class="form-control" formControlName="name" maxlength="100" />
        </div>
        <span *ngIf="isInValid('name')" class="error">Name is required.</span>
      </div>
    </div>
    <br />

    <div class="row">
      <div class="col-sm-2 col-md-2 col-lg-2 form-grid-stye"><label>Package Rate</label></div>
      <div class="col-sm-4 col-md-4 col-lg-4 form-grid-stye">
        <input type="number" class="form-control" formControlName="packageRate" />
      </div>
      <div class="col-sm-6 col-md-6 col-lg-6 form-grid-stye">
        <label><input type="checkbox" formControlName="isActive" /> Active</label>
      </div>
    </div>
    <br />

    <h4>Profile Tests</h4>
    <table class="table table-bordered">
      <thead>
        <tr>
          <th>Test</th>
          <th width="120">Qty</th>
          <th width="60"></th>
        </tr>
      </thead>
      <tbody formArrayName="lines">
        <tr *ngFor="let line of lines.controls; let i=index" [formGroupName]="i">
          <td>
            <select class="form-control" formControlName="testId" (change)="onTestChange(i)">
              <option value="">-- Select Test --</option>
              <option *ngFor="let t of tests" [value]="t.id">{{t.hisTestCode}} - {{t.hisTestCodeDescription}}</option>
            </select>
          </td>
          <td><input type="number" class="form-control" formControlName="quantity" min="1" (change)="recalcPackageRate()" /></td>
          <td><button type="button" class="btn btn-xs btn-danger" (click)="removeLine(i)">X</button></td>
        </tr>
      </tbody>
    </table>
    <button type="button" class="btn btn-default btn-sm" (click)="addLine()">+ Add Test</button>
    <button type="button" class="btn btn-default btn-sm" style="margin-left:8px" (click)="recalcPackageRate()">Recalculate Rate</button>
    <br /><br />

    <button type="submit" class="btn btn-primary" [disabled]="loading">Save</button>
    <button type="button" class="btn btn-default" (click)="cancel()">Cancel</button>
    <button type="button" class="btn btn-warning" *ngIf="id" (click)="deactivate()">Deactivate</button>
  </form>
</div>
