<div class="row" *ngIf="isLoaded">
    <div class="col-sm-12 col-md-12 col-lg-12">
        <form [formGroup]="createTestForm" (ngSubmit)="onSubmit()">
            <h3>Add Test</h3>
            <hr />
            <div class="row">
                <div class="col-sm-12 col-md-12 col-lg-12">
                    <div class="form-group">
                        <div>
                            <h3>Test Information</h3>
                            <div class="row">
                                <div class="col-sm-2 col-md-2 col-lg-2 form-grid-stye"><label>Test Code<span
                                            class="error">*</span></label></div>
                                <div class="col-sm-4 col-md-4 col-lg-4 form-grid-stye">
                                    <div class="input-group">
                                        <span class="input-group-addon"><i class="glyphicon glyphicon-barcode"></i></span>
                                        <input [type]="'text'" class="form-control" formControlName="testCode"
                                            placeholder="Enter Test Code" maxlength="50">
                                    </div>
                                    <span *ngIf="isInValid('testCode')" class="error">Test Code is required.</span>
                                </div>
                                <div class="col-sm-2 col-md-2 col-lg-2 form-grid-stye"><label>Test Name<span
                                            class="error">*</span></label></div>
                                <div class="col-sm-4 col-md-4 col-lg-4 form-grid-stye">
                                    <div class="input-group">
                                        <span class="input-group-addon"><i class="glyphicon glyphicon-tag"></i></span>
                                        <input [type]="'text'" class="form-control" formControlName="testName"
                                            placeholder="Enter Test Name" maxlength="100">
                                    </div>
                                    <span *ngIf="isInValid('testName')" class="error">Test Name is required.</span>
                                </div>
                            </div>
                            <br />
                            <div class="row">
                                <div class="col-sm-2 col-md-2 col-lg-2 form-grid-stye"><label>Specimen<span
                                            class="error">*</span></label></div>
                                <div class="col-sm-4 col-md-4 col-lg-4 form-grid-stye">
                                    <div class="input-group">
                                        <span class="input-group-addon"><i class="glyphicon glyphicon-list"></i></span>
                                        <select class="form-control" formControlName="specimenId">
                                            <option value="">Select Specimen</option>
                                            <option *ngFor="let specimen of specimens" value="{{specimen.id}}">
                                                {{specimen.name}}
                                            </option>
                                        </select>
                                    </div>
                                    <span *ngIf="isInValid('specimenId')" class="error">Specimen is required.</span>
                                </div>
                                <div class="col-sm-2 col-md-2 col-lg-2 form-grid-stye"><label>Department<span
                                            class="error">*</span></label></div>
                                <div class="col-sm-4 col-md-4 col-lg-4 form-grid-stye">
                                    <div class="input-group">
                                        <span class="input-group-addon"><i class="glyphicon glyphicon-list"></i></span>
                                        <select class="form-control" formControlName="departmentId">
                                            <option value="">Select Department</option>
                                            <option *ngFor="let department of departments" value="{{department.id}}">
                                                {{department.name}}
                                            </option>
                                        </select>
                                    </div>
                                    <span *ngIf="isInValid('departmentId')" class="error">Department is required.</span>
                                </div>
                            </div>
                            <br />
                            <div class="row">
                                <div class="col-sm-2 col-md-2 col-lg-2 form-grid-stye"><label>Active</label></div>
                                <div class="col-sm-4 col-md-4 col-lg-4 form-grid-stye">
                                    <div class="input-group">
                                        <input [type]="'checkbox'" formControlName="isActive">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-sm-12 col-md-12 col-lg-12">
                    <alert></alert>
                </div>
            </div>
            <hr />
            <div class="row">
                <div class="col-sm-12 col-md-12 col-lg-12">
                    <div>
                        <button class="btn btn-primary" [disabled]="loading">
                            <span *ngIf="loading" class="spinner-border spinner-border-sm mr-2"></span>
                            Submit
                        </button>
                        &nbsp;
                        <button class="btn btn-default" (click)="router.navigate(['/test-master'])">Cancel</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
